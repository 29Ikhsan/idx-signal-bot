# Sinyal A — swing trading, sekali per hari bursa MENJELANG closing,
# supaya sinyal masih bisa dieksekusi (bid) di hari yang sama sebelum
# sesi II berakhir 15.49.59 WIB.
# Konsekuensi yang disadari: harga berjalan dipakai sebagai close
# sementara, dan volume hari berjalan belum penuh (kriteria volume
# efektif lebih ketat). Menit :08 relatif sepi di cron GitHub.
name: Swing Signal Check

on:
  schedule:
    - cron: "8 8 * * 1-5" # Senin-Jumat 15.08 WIB
  workflow_dispatch: {} # bisa dipicu manual untuk testing

jobs:
  swing:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # scan ~900 ticker butuh beberapa menit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run swing signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main_swing
