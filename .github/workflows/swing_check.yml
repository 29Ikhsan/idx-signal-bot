# Sinyal A — swing trading, sekali per hari bursa setelah closing.
# Sesi II BEI berakhir 15.49.59 WIB, harga penutupan final via closing
# auction ~15.50 -> jalan 15.58 WIB = 08.58 UTC (menit :58 juga relatif
# sepi di cron GitHub, mengurangi risiko ditunda).
name: Swing Signal Check

on:
  schedule:
    - cron: "58 8 * * 1-5" # Senin-Jumat 15.58 WIB
  workflow_dispatch: {} # bisa dipicu manual untuk testing

jobs:
  swing:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # scan ~900 ticker butuh beberapa menit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run swing signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main_swing
