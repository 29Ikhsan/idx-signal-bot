# Sinyal A — swing trading, sekali per hari bursa setelah closing.
# BEI selesai sesi pasca-penutupan 16.15 WIB -> jalan 16.30 WIB = 09.30 UTC.
name: Swing Signal Check

# Catatan: cron GitHub Actions best effort — bisa telat saat beban tinggi.
# Menit :30 ramai; digeser ke :37 supaya lebih sering tepat waktu. Telat
# untuk sinyal swing tidak masalah karena dihitung dari data closing.
on:
  schedule:
    - cron: "37 9 * * 1-5" # Senin-Jumat 16.37 WIB
  workflow_dispatch: {} # bisa dipicu manual untuk testing

jobs:
  swing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run swing signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main_swing
