# Sinyal B — breakout volume, tiap 15 menit selama jam bursa BEI.
# Jadwal bursa (SK Direksi BEI No. II-A Kep-00003/BEI/04-2025):
#   Senin-Kamis 09.00-15.49 WIB  = 02.00-08.49 UTC
#   Jumat       09.00-11.30 WIB  = 02.00-04.30 UTC
#               14.00-15.49 WIB  = 07.00-08.49 UTC
# Catatan: cron GitHub Actions adalah BEST EFFORT — bisa telat/skip saat
# beban tinggi. Menit 0/15/30/45 paling ramai dipakai jutaan repo, jadi
# jadwal digeser ke menit 3/18/33/48 supaya lebih sering kebagian slot.
name: Breakout Signal Check

on:
  schedule:
    - cron: "3,18,33,48 2-8 * * 1-4" # Senin-Kamis 09.03-15.48 WIB
    - cron: "3,18,33,48 2-3 * * 5" # Jumat 09.03-10.48 WIB
    - cron: "3,18,30 4 * * 5" # Jumat 11.03-11.30 WIB
    - cron: "3,18,33,48 7-8 * * 5" # Jumat 14.03-15.48 WIB
  workflow_dispatch: {} # bisa dipicu manual untuk testing

concurrency:
  group: breakout-check
  cancel-in-progress: false # biarkan run sebelumnya selesai dulu

jobs:
  breakout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run breakout signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main_breakout
