# Konfigurasi idx-signal-bot
# Semua threshold sinyal diatur di sini, bukan di kode.

# Sumber data: "yahoo" (yfinance, ticker .JK) atau "mock" (data sintetis untuk testing).
# GANTI DI SINI kalau sumber data resmi sudah ditentukan (lihat src/data_source.py).
data_source: yahoo

# Watchlist kurasi: saham likuid (rata-rata transaksi > Rp 40 M/hari per
# validasi Yahoo Finance) tersebar antar sektor, cocok untuk sinyal
# swing (butuh tren) dan breakout volume (butuh baseline volume sehat).
tickers:
  # Perbankan — paling likuid di IDX, tren cenderung rapi
  - BBCA
  - BBRI
  - BMRI
  - BBNI
  # Telekomunikasi
  - TLKM
  # Konsumer & ritel — defensif, swing pullback sering bersih
  - ICBP
  - INDF
  - AMRT
  # Otomotif & alat berat
  - ASII
  - UNTR
  # Logam & tambang — paling sering memicu breakout volume
  - ANTM
  - MDKA
  - INCO
  # Energi
  - ADRO
  - MEDC
  - PGAS
  # tambah/kurangi di sini (tanpa suffix .JK)

swing:
  ma_period: 50
  rsi_period: 14
  rsi_min: 40
  rsi_max: 60
  volume_avg_period: 20
  support_resistance_radius_pct: 5   # radius X persen dari level support/resistance terdekat
  min_risk_reward: 2.0               # rasio minimal 1:2

breakout:
  volume_threshold: 2.0              # volume hari ini > 2x rata-rata
  volume_avg_period: 20
